codex:
  launch_commands:
    userspace: codex -C ~/qmk/qmk_userspace --add-dir ~/qmk
    firmware: codex -C ~/qmk/qmk_firmware --add-dir ~/qmk
  notes:
    - Start in the repo you expect to edit most.
    - The parent workspace is granted with --add-dir so Codex can also read and update workspace metadata and the sibling repo.

workspace:
  root: ~/qmk
  root_repo: .
  repositories:
    firmware: qmk_firmware
    userspace: qmk_userspace
preferred_launch_directory: repo-under-edit

overlay:
  userspace_repo: qmk_userspace
  configure_command: qmk config user.overlay_dir="$(realpath qmk_userspace)"
  health_check: qmk userspace-doctor

custom_board:
  keyboard: bastardkb/charybdis/3x5/fleetsing36
  firmware_path: qmk_firmware/keyboards/bastardkb/charybdis/3x5/fleetsing36
  firmware_files:
    - qmk_firmware/keyboards/bastardkb/charybdis/3x5/fleetsing36/config.h
    - qmk_firmware/keyboards/bastardkb/charybdis/3x5/fleetsing36/keyboard.json
    - qmk_firmware/keyboards/bastardkb/charybdis/3x5/fleetsing36/rules.mk

userspace:
  repo_path: qmk_userspace
  qmk_json: qmk_userspace/qmk.json
  keymap:
    keyboard: bastardkb/charybdis/3x5/fleetsing36
    keymap: fleetsing
    path: qmk_userspace/keyboards/bastardkb/charybdis/3x5/fleetsing36/keymaps/fleetsing
    files:
      - qmk_userspace/keyboards/bastardkb/charybdis/3x5/fleetsing36/keymaps/fleetsing/keymap.c
      - qmk_userspace/keyboards/bastardkb/charybdis/3x5/fleetsing36/keymaps/fleetsing/config.h
      - qmk_userspace/keyboards/bastardkb/charybdis/3x5/fleetsing36/keymaps/fleetsing/rules.mk
  shared_user:
    name: fleetsing
    path: qmk_userspace/users/fleetsing
    files:
      - qmk_userspace/users/fleetsing/config.h
      - qmk_userspace/users/fleetsing/fleetsing.h
      - qmk_userspace/users/fleetsing/fleetsing.c
      - qmk_userspace/users/fleetsing/pointing.c
      - qmk_userspace/users/fleetsing/display.c
      - qmk_userspace/users/fleetsing/haptics.c
      - qmk_userspace/users/fleetsing/rules.mk
      - qmk_userspace/users/fleetsing/layouts/charybdis_3x5/layout_positions.h
      - qmk_userspace/users/fleetsing/layouts/charybdis_3x5/combos.def
      - qmk_userspace/users/fleetsing/layouts/charybdis_3x5/fi_autoshift.c
  generated_artifacts:
    - qmk_userspace/*.hex
    - qmk_userspace/*.uf2

build_targets:
  - keyboard: bastardkb/charybdis/3x5/fleetsing36
    keymap: fleetsing
    status: active
    note: This is the primary keymap for this userspace. It is present in qmk.json and has a matching keymap folder in this userspace snapshot. Treat qmk.json as the source of truth even if historical .hex or .uf2 artifacts for other targets exist in the repo root.

verification:
  overlay_prerequisite: qmk config user.overlay_dir="$(realpath qmk_userspace)"
  primary_compile: qmk compile -kb bastardkb/charybdis/3x5/fleetsing36 -km fleetsing
  primary_compile_note: Currently compiles cleanly. The earlier inherited 35-vs-36 LAYOUT metadata mismatch was fixed by aligning keyboards/bastardkb/charybdis/3x5/info.json with fleetsing36/keyboard.json.
  userspace_compile: qmk userspace-compile -c -p
  format_changed_c: qmk format-c <changed-files>

ownership_rules:
  firmware:
    - keyboard.json
    - config.h
    - rules.mk
    - matrix, pin, split transport, and board conversion details
    - hardware-specific definitions tied to the custom board
  userspace:
    - keymap.c
    - keymap config.h and rules.mk
    - shared hooks and helpers under users/fleetsing
    - layout-specific userspace modules under users/fleetsing/layouts/
    - layers, combos, tap dance, repeat keys, caps word, display, pointing, and haptics behavior

gotchas:
  - Generic hook dispatch now lives in qmk_userspace/users/fleetsing/fleetsing.c, with pointing/layer-state handling in qmk_userspace/users/fleetsing/pointing.c.
  - Charybdis 3x5 layout-specific positional aliases, combos, and Auto Shift behavior now live under qmk_userspace/users/fleetsing/layouts/charybdis_3x5/.
  - Combo definitions live in qmk_userspace/users/fleetsing/layouts/charybdis_3x5/combos.def and are included by the keymap so QMK keymap introspection can still see key_combos.
  - Shared enums and custom keycodes SET_MS_L and SET_MS_R live in users/fleetsing/fleetsing.h.
  - Scroll-side selection is userspace-managed in users/fleetsing/pointing.c and only determines which side's motion is converted into scroll reports. Sensor DPI remains owned by the Charybdis firmware keycodes and config.
  - QK_REP and QK_AREP use QMK core repeat-key handling directly; there is no userspace repeat module in the current snapshot.
  - There is no active tap-dance definition in the current keymap snapshot.
  - qmk_userspace/users/fleetsing/config.h exists and is currently only a placeholder.
  - The custom board target is bastardkb/charybdis/3x5/fleetsing36.
  - The inherited parent layout metadata in qmk_firmware/keyboards/bastardkb/charybdis/3x5/info.json has been aligned with the 36-key custom board layout. If a future layout-count warning appears, verify both inherited and custom keyboard metadata before assuming the userspace keymap is wrong.
  - "In keyboard.json, development_board: elite_c and pin_compatible: elite_c describe Elite-C-compatible pin metadata only. They do not imply that a separate elitec/... keyboard path is active in this workspace."
  - Actual build behavior for the custom board is controlled by qmk_firmware/keyboards/bastardkb/charybdis/3x5/fleetsing36/rules.mk, which sets CONVERT_TO = rp2040_ce.
  - Treat development_board and pin_compatible as hardware metadata, not as instructions to switch keyboard targets. Do not infer alternate keyboard paths unless they exist in the checked-out tree and are confirmed by the QMK CLI.
  - Do not edit generated .hex or .uf2 files unless explicitly asked.
  - Avoid moving existing settings between keyboard.json, config.h, and rules.mk unless the task specifically calls for it.

local_doc_priority:
  - qmk_firmware/docs/
  - qmk_firmware/keyboards/bastardkb/charybdis/3x5/fleetsing36/
  - qmk_userspace/keyboards/bastardkb/charybdis/3x5/fleetsing36/keymaps/fleetsing/
  - qmk_userspace/users/fleetsing/
